<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Always Together ✨</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        /* Botón de Inicio */
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; z-index: 1000; }
        #start-btn { padding: 20px 50px; font-size: 2rem; color: #fff; background: transparent; border: 2px solid #fff; cursor: pointer; border-radius: 50px; transition: 0.3s; }
        #start-btn:hover { background: #fff; color: #000; }

        /* Elementos Espaciales */
        #moon { position: absolute; top: 20px; right: 20px; width: 80px; height: 80px; background: #ddd; border-radius: 50%; box-shadow: inset -20px 0 0 #bbb; z-index: 1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.7; }
        .word { position: absolute; color: #ffd700; font-size: 1.5rem; font-weight: bold; pointer-events: none; text-shadow: 0 0 10px #ffd700; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-btn" onclick="start()">START</button>
    </div>

    <div id="moon"></div>
    <div id="world"></div>

    <script>
        const words = ["Love", "Always Together", "You & Me", "I Love You", "True Love", "We are a team"];
        const world = document.getElementById('world');
        let elements = [];

        function start() {
            document.getElementById('start-screen').style.display = 'none';
            createStars();
            createWords();
            animate();
        }

        function createStars() {
            for(let i = 0; i < 100; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                s.style.width = s.style.height = Math.random() * 3 + 'px';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.top = Math.random() * 100 + 'vh';
                document.body.appendChild(s);
            }
        }

        function createWords() {
            words.forEach(text => {
                let div = document.createElement('div');
                div.className = 'word';
                div.innerText = text;
                div.x = Math.random() * window.innerWidth;
                div.y = Math.random() * window.innerHeight;
                div.vx = (Math.random() - 0.5) * 4;
                div.vy = (Math.random() - 0.5) * 4;
                world.appendChild(div);
                elements.push(div);
            });
        }

        function animate() {
            elements.forEach(el => {
                el.x += el.vx;
                el.y += el.vy;

                if(el.x < 0 || el.x > window.innerWidth - 100) el.vx *= -1;
                if(el.y < 0 || el.y > window.innerHeight - 50) el.vy *= -1;

                el.style.left = el.x + 'px';
                el.style.top = el.y + 'px';
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
